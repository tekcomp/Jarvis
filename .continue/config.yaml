system_prompt: |
  You are glm‑4.7‑flash:latest, operating in strict token‑budget mode.

  Priority Order:
  1. Protect token budget.
  2. Protect context window.
  3. Follow routing logic.
  4. Follow workflow.
  5. Follow style rules.

  Routing Logic:
  - Angular tasks → qwen2.5-coder:14b
  - Reasoning tasks → phi3.5
  - Coding tasks → qwen2.5-coder:14b
  - Testing tasks → qwen2.5-coder:14b
  - Boot/procedural tasks → glm-4.7-flash
  - General chat → llama3:latest
  - Fast responses → qwen-14b-fast
  - Local tasks → phi4-local or qwen-coder-local

  Token Rules:
  - If user input exceeds your safe context threshold, ask for a short summary.
  - Never request full files unless absolutely necessary for correctness.
  - Always request summaries first, then file lists, then targeted snippets.
  - Compress internal reasoning into brief conclusions only.

  Workflow:
  - Ask for a high‑level project summary.
  - Ask for a file list with 1‑line descriptions.
  - Identify top 3 likely problem areas.
  - Request only the minimal snippets needed.
  - If context grows too large, ask what to drop.

  Style:
  - Short sentences.
  - Minimal tokens.
  - No chain‑of‑thought.
  - Only final conclusions.
  - When unsure, ask for the smallest clarifying detail.

  Mission:
  Maximum fix. Minimum tokens.

models:
  - name: RTX Copilot Stack
    version: 1.0.0
    schema: v1

  - name: Phi-4 14B
    provider: ollama
    model: phi4:14b
    apiBase: http://localhost:11434
    roles: [chat, edit, apply]
    capabilities: [reasoning, planning]

  - name: Qwen Coder 14B
    provider: ollama
    model: qwen2.5-coder:14b
    apiBase: http://localhost:11434
    roles: [chat, edit, apply]
    capabilities: [code, tool_use, tests]

  - name: GLM 4.7 Flash
    provider: ollama
    model: glm-4.7-flash
    apiBase: http://localhost:11434
    capabilities: [tool_use, procedural, boot]

  - name: Llama 3
    provider: ollama
    model: llama3:latest
    apiBase: http://localhost:11434
    roles: [chat]
    capabilities: [chat]

  - name: Phi 3.5
    provider: ollama
    model: phi3.5:latest
    apiBase: http://localhost:11434
    roles: [chat]
    capabilities: [reasoning, planning]

  - name: deepseek-r1
    provider: openrouter
    model: deepseek/deepseek-r1
    capabilities: [reasoning]

  - name: qwen-coder-32b
    provider: openrouter
    model: qwen/qwen-2.5-coder-32b
    capabilities: [code]

  - name: llama-3.1-70b
    provider: openrouter
    model: meta-llama/llama-3.1-70b
    capabilities: [chat]

  - name: qwen-14b-fast
    provider: openrouter
    model: qwen/qwen-2.5-14b
    capabilities: [fast]

  - name: phi4-local
    provider: ollama
    model: phi4:14b
    capabilities: [local, fast]

  - name: qwen-coder-local
    provider: ollama
    model: qwen2.5-coder:14b
    capabilities: [local, code]

  - name: Autodetect
    provider: ollama
    model: AUTODETECT

routing:
  # -------------------------
  # Angular Routing
  # -------------------------
  - name: angular-routing
    match:
      any:
        - regex: "(?i)\\bangular\\b"
        - regex: "(?i)\\bstandalone component\\b"
        - regex: "(?i)\\bonpush\\b"
        - regex: "(?i)\\brxjs\\b"
        - regex: "(?i)\\btypescript\\b"
        - regex: "\\.component\\.ts$"
        - regex: "\\.service\\.ts$"
        - regex: "src/app/"
    use: qwen-coder-14b

  # -------------------------
  # Reasoning, planning, architecture
  # -------------------------
  - name: reasoning-routing
    match: reasoning
    use: phi3.5

  # -------------------------
  # Coding, refactoring, integration tests
  # -------------------------
  - name: coding-routing
    match: code
    use: qwen-coder-14b

  # -------------------------
  # Testing tasks
  # -------------------------
  - name: testing-routing
    match: tests
    use: qwen-coder-14b

  # -------------------------
  # Boot / procedural tasks
  # -------------------------
  - name: procedural-routing
    match: procedural
    use: glm-4.7-flash

  # -------------------------
  # General chat
  # -------------------------
  - name: chat-routing
    match: chat
    use: llama3

  # -------------------------
  # Fast responses
  # -------------------------
  - name: fast-routing
    match: fast
    use: qwen-14b-fast

  # -------------------------
  # Local tasks
  # -------------------------
  - name: local-routing
    match: local
    use: phi4-local
    
  # -------------------------
  # Backend: Node / Express / NestJS
  # -------------------------
  - name: backend-node-routing
    match:
      any:
        - regex: "(?i)node"
        - regex: "(?i)express"
        - regex: "(?i)nestjs"
        - regex: "(?i)nestjs controller"
        - regex: "(?i)nestjs module"
        - regex: "(?i)nestjs service"
        - regex: "\\.controller\\.ts$"
        - regex: "\\.service\\.ts$"
    use: coding

  # -------------------------
  # Backend: Python (FastAPI / Flask)
  # -------------------------
  - name: backend-python-routing
    match:
      any:
        - regex: "(?i)fastapi"
        - regex: "(?i)flask"
        - regex: "(?i)python backend"
        - regex: "\\.py$"
    use: coding

  # -------------------------
  # Backend: C# / .NET
  # -------------------------
  - name: backend-dotnet-routing
    match:
      any:
        - regex: "(?i)dotnet"
        - regex: "(?i)c#"
        - regex: "(?i)asp\\.net"
        - regex: "(?i)aspnet"
        - regex: "(?i)entity framework"
        - regex: "\\.cs$"
    use: coding

  # -------------------------
  # Backend: SQL / Databases
  # -------------------------
  - name: backend-sql-routing
    match:
      any:
        - regex: "(?i)sql"
        - regex: "(?i)postgres"
        - regex: "(?i)mysql"
        - regex: "(?i)sqlite"
        - regex: "(?i)database schema"
        - regex: "(?i)migration"
    use: coding

  # -------------------------
  # Backend: API Design / Architecture
  # -------------------------
  - name: backend-api-design-routing
    match:
      any:
        - regex: "(?i)api design"
        - regex: "(?i)rest api"
        - regex: "(?i)openapi"
        - regex: "(?i)swagger"
    use: reasoning
