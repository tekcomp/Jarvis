name: RTX Copilot Stack
version: 1.0.0
schema: v1

models:
  - name: Phi-4 14B
    provider: ollama
    model: phi4:14b
    apiBase: http://localhost:11434
    roles: [chat, edit, apply]
    capabilities: [reasoning, planning]

  - name: Qwen Coder 14B
    provider: ollama
    model: qwen2.5-coder:14b
    apiBase: http://localhost:11434
    roles: [chat, edit, apply]
    capabilities: [code, tool_use]

  - name: GLM 4.7 Flash
    provider: ollama
    model: glm-4.7-flash
    apiBase: http://localhost:11434
    capabilities: [tool_use]

  - name: Llama 3
    provider: ollama
    model: llama3:latest
    apiBase: http://localhost:11434
    roles: [chat]

  - name: Phi 3.5
    provider: ollama
    model: phi3.5:latest
    apiBase: http://localhost:11434
    roles: [chat]

  - name: Autodetect
    provider: ollama
    model: AUTODETECT

context:
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: folder
